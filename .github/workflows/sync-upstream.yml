name: Sync Upstream VKD3D-Proton

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      force_sync:
        description: Force sync even if no upstream changes
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  UPSTREAM_REPO: HansKristian-Work/vkd3d-proton
  UPSTREAM_BRANCH: master
  FORK_BRANCH: master

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "SeaNaxxx"
          git config --global user.email "seanaxxx@users.noreply.github.com"

      - name: Backup workflows
        run: cp -r .github .github.bak

      - name: Add upstream remote
        run: git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git

      - name: Fetch upstream
        run: git fetch upstream ${{ env.UPSTREAM_BRANCH }} --no-tags

      - name: Check for upstream changes
        id: check
        run: |
          UPSTREAM_COMMIT_FULL=$(git rev-parse upstream/${{ env.UPSTREAM_BRANCH }})
          UPSTREAM_COMMIT_SHORT=$(git rev-parse --short=8 upstream/${{ env.UPSTREAM_BRANCH }})

          BEHIND=$(git rev-list HEAD..upstream/${{ env.UPSTREAM_BRANCH }} --count)

          if [[ "$BEHIND" -eq 0 ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Fork is up to date with upstream"
          else
            echo "Fork is $BEHIND commits behind upstream"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

          echo "upstream_commit=$UPSTREAM_COMMIT_SHORT" >> "$GITHUB_OUTPUT"
          echo "upstream_commit_full=$UPSTREAM_COMMIT_FULL" >> "$GITHUB_OUTPUT"

      - name: Reset and restore workflows
        if: steps.check.outputs.changed == 'true' || inputs.force_sync == 'true'
        run: |
          # Reset to upstream (clean mirror)
          git reset --hard upstream/${{ env.UPSTREAM_BRANCH }}

          # Restore our workflow files
          rm -rf .github
          cp -r .github.bak .github

          # Save upstream commit reference for build workflows
          echo "${{ steps.check.outputs.upstream_commit_full }}" > .upstream-commit

          # Commit workflow restore
          git add .github .upstream-commit
          git diff-index --quiet HEAD || git commit -m "chore: sync upstream (${{ steps.check.outputs.upstream_commit }}) and restore workflows"

      - name: Push to fork
        if: steps.check.outputs.changed == 'true' || inputs.force_sync == 'true'
        run: git push --force origin ${{ env.FORK_BRANCH }}

      - name: Summary
        run: |
          echo "=== Sync Summary ==="
          echo "Upstream: ${{ steps.check.outputs.upstream_commit }}"
          echo "Changed: ${{ steps.check.outputs.changed }}"
          echo "Force: ${{ inputs.force_sync }}"
