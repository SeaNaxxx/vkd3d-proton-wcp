name: Sync Upstream VKD3D-Proton

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  UPSTREAM_REPO: HansKristian-Work/vkd3d-proton
  UPSTREAM_BRANCH: master
  FORK_BRANCH: master

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git
        run: |
          git config user.name "SeaNaxxx"
          git config user.email "SeaNaxxx@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git
          git fetch upstream ${{ env.UPSTREAM_BRANCH }} --no-tags

      - name: Check changes
        id: check
        run: |
          BEHIND=$(git rev-list HEAD..upstream/${{ env.UPSTREAM_BRANCH }} --count)
          if [ "$BEHIND" -eq 0 ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Up to date"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "$BEHIND commits behind"
          fi
          echo "commit=$(git rev-parse --short=8 upstream/${{ env.UPSTREAM_BRANCH }})" >> "$GITHUB_OUTPUT"
          echo "commit_full=$(git rev-parse upstream/${{ env.UPSTREAM_BRANCH }})" >> "$GITHUB_OUTPUT"

      - name: Merge upstream
        if: steps.check.outputs.changed == 'true'
        run: |
          mkdir -p /tmp/wf
          cp -r .github/workflows/* /tmp/wf/ 2>/dev/null || true

          git merge upstream/${{ env.UPSTREAM_BRANCH }} --no-commit --no-ff || true

          git diff --name-only --diff-filter=U 2>/dev/null | grep -v '^\.github/' | while read f; do
            git checkout upstream/${{ env.UPSTREAM_BRANCH }} -- "$f" 2>/dev/null || true
          done

          rm -rf .github/workflows
          mkdir -p .github/workflows
          cp -r /tmp/wf/* .github/workflows/ 2>/dev/null || true

          echo "${{ steps.check.outputs.commit_full }}" > .upstream-commit

          git add -A
          GIT_COMMITTER_NAME="SeaNaxxx" GIT_COMMITTER_EMAIL="SeaNaxxx@users.noreply.github.com" \
            git commit -m "sync upstream ${{ steps.check.outputs.commit }}"

      - name: Push
        if: steps.check.outputs.changed == 'true'
        run: git push origin ${{ env.FORK_BRANCH }}

      - name: Trigger builds
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh workflow run artifacts.yml
          gh workflow run artifacts-arm64ec.yml
